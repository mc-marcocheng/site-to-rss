name: Check for Updates

on:
  schedule:
    # Every 6 hours: at minute 0 of hours 0, 6, 12, 18 UTC
    - cron: "0 */6 * * *"

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  actions: write

concurrency:
  group: "check-updates"
  cancel-in-progress: false

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    outputs:
      has_updates: ${{ steps.check.outputs.has_updates }}
      new_count: ${{ steps.check.outputs.new_count }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Run update check
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run scripts/check_updates.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json docs/*.xml docs/index.html
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🔄 Feed updated (+${{ steps.check.outputs.new_count }} items) [$(date -u +%Y-%m-%d)]"
            git pull --rebase origin master
            git push
          fi

  deploy-pages:
    needs: check-and-update
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout (latest commit)
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Delete stale github-pages artifacts for this run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts --paginate \
            --jq '.artifacts[] | select(.name=="github-pages") | .id' |
          while read -r id; do
            echo "Deleting stale artifact $id"
            gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/$id || true
          done

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "docs"

      - name: Deploy to GitHub Pages (attempt 1)
        id: deployment1
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry 1
        if: steps.deployment1.outcome == 'failure'
        run: sleep 30

      - name: Deploy to GitHub Pages (attempt 2)
        id: deployment2
        if: steps.deployment1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry 2
        if: steps.deployment1.outcome == 'failure' && steps.deployment2.outcome == 'failure'
        run: sleep 90

      - name: Deploy to GitHub Pages (attempt 3)
        id: deployment3
        if: steps.deployment1.outcome == 'failure' && steps.deployment2.outcome == 'failure'
        uses: actions/deploy-pages@v4

      - name: Resolve deployment output
        id: deployment
        if: always()
        run: |
          echo "page_url=${{ steps.deployment1.outputs.page_url || steps.deployment2.outputs.page_url || steps.deployment3.outputs.page_url }}" >> "$GITHUB_OUTPUT"
