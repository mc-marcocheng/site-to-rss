feed:
  title: "Site-to-RSS Aggregator"
  subtitle: "Monitor website changes, delivered as RSS · Updated daily"
  author: "RSS Bot"
  # CHANGE THIS to your GitHub Pages URL:
  base_url: "https://mc-marcocheng.github.io/site-to-rss"
  repo_url: "https://github.com/mc-marcocheng/site-to-rss"

sources:
  # ──────────────────────────────────────────────────────────────
  # HelloGitHub - Monthly open source showcase
  # ──────────────────────────────────────────────────────────────
  - id: hellogithub
    name: HelloGitHub
    type: sequential
    start: 121
    url: "https://hellogithub.com/en/periodical/volume/{n}"
    check_url: "https://hellogithub.com/en/periodical/volume/{n}"
    title: "HelloGitHub Vol.{n}"
    summary: "HelloGitHub periodical volume {n} is now available."
    tags: [open-source, monthly]
    content:
      xpath: "/html/body/div[1]/div/div[1]/main/div/div/div[1]/div/div[2]"
      type: html
      base_url: "https://hellogithub.com"
      remove:
        - xpath: "//script"
        - xpath: "//style"

  # ──────────────────────────────────────────────────────────────
  # Ruanyf's Tech Weekly - Chinese tech newsletter
  # ──────────────────────────────────────────────────────────────
  - id: ruanyf-weekly
    name: 科技爱好者周刊
    type: sequential
    start: 394
    url: "https://github.com/ruanyf/weekly/blob/master/docs/issue-{n}.md"
    check_url: "https://raw.githubusercontent.com/ruanyf/weekly/master/docs/issue-{n}.md"
    title: "科技爱好者周刊 Issue {n}"
    summary: "Ruanyf's Tech Weekly issue {n} is now available."
    tags: [tech, weekly, chinese]
    content:
      type: markdown
      fetch_url: "https://raw.githubusercontent.com/ruanyf/weekly/master/docs/issue-{n}.md"
      base_url: "https://raw.githubusercontent.com/ruanyf/weekly/master/docs"
